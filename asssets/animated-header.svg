<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap');
      
      .glow-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 64px;
        font-weight: 800;
        fill: #3fb950;
        text-anchor: middle;
        filter: drop-shadow(0 0 10px #3fb950);
        animation: glow-pulse 3s ease-in-out infinite;
      }
      
      .subtitle {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        fill: #58a6ff;
        text-anchor: middle;
        animation: fade-in-out 4s ease-in-out infinite;
      }
      
      .tagline {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        fill: #8b949e;
        text-anchor: middle;
        animation: slide-in 2s ease-out forwards;
      }
      
      @keyframes glow-pulse {
        0%, 100% {
          filter: drop-shadow(0 0 10px #3fb950);
          opacity: 1;
        }
        50% {
          filter: drop-shadow(0 0 20px #3fb950) drop-shadow(0 0 30px #58a6ff);
          opacity: 0.9;
        }
      }
      
      @keyframes fade-in-out {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      
      @keyframes slide-in {
        from {
          opacity: 0;
          transform: translateX(-100px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      .glow-circle {
        animation: float 6s ease-in-out infinite;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
    </style>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1419;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="300" fill="url(#bgGrad)"/>
  
  <!-- Animated glow circles -->
  <circle cx="200" cy="80" r="60" fill="#3fb950" opacity="0.1" class="glow-circle" filter="url(#glow)"/>
  <circle cx="600" cy="150" r="50" fill="#58a6ff" opacity="0.1" class="glow-circle" filter="url(#glow)"/>
  
  <!-- Main text -->
  <text x="400" y="100" class="glow-text">MUKUND</text>
  <text x="400" y="160" class="glow-text">KAPADIA</text>
  
  <!-- Subtitle -->
  <text x="400" y="195" class="subtitle">Full-Stack Developer • System Architect</text>
  
  <!-- Tagline -->
  <text x="400" y="225" class="tagline">🍁 Toronto • Shipping production since 2022 • 🚀</text>
</svg>
