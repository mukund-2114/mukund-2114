<svg viewBox="0 0 900 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
      
      .tech-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 600;
        fill: #3fb950;
      }
      
      .tech-icon {
        font-size: 28px;
      }
      
      .bar-bg {
        fill: #161b22;
        rx: 5;
      }
      
      .bar-fill {
        fill: #3fb950;
        rx: 5;
      }
      
      .bar-fill-secondary {
        fill: #58a6ff;
        rx: 5;
      }
      
      .bar-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        fill: #8b949e;
      }
      
      /* Animations */
      .animate-bar-1 { animation: fill-bar 2s ease-in-out 0s infinite; }
      .animate-bar-2 { animation: fill-bar 2s ease-in-out 0.2s infinite; }
      .animate-bar-3 { animation: fill-bar 2s ease-in-out 0.4s infinite; }
      .animate-bar-4 { animation: fill-bar 2s ease-in-out 0.6s infinite; }
      .animate-bar-5 { animation: fill-bar 2s ease-in-out 0.8s infinite; }
      
      @keyframes fill-bar {
        0%, 100% { 
          x: 140;
          width: 100%;
        }
        50% { 
          x: 140;
          width: 85%;
        }
      }
      
      .glow-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 20px;
        font-weight: 600;
        fill: #58a6ff;
        animation: pulse-glow 2s ease-in-out infinite;
      }
      
      @keyframes pulse-glow {
        0%, 100% { 
          fill: #58a6ff;
          filter: drop-shadow(0 0 0px #58a6ff);
        }
        50% { 
          fill: #3fb950;
          filter: drop-shadow(0 0 8px #3fb950);
        }
      }
    </style>
    
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="250" fill="#0d1117"/>
  
  <!-- Title -->
  <text x="20" y="40" class="glow-text">🛠️ Tech Stack Proficiency</text>
  
  <!-- React -->
  <text x="20" y="90" class="tech-label">⚛️ React</text>
  <rect x="140" y="75" width="300" height="20" class="bar-bg"/>
  <rect x="140" y="75" width="285" height="20" class="bar-fill animate-bar-1"/>
  <text x="450" y="90" class="bar-label">95%</text>
  
  <!-- Node.js -->
  <text x="20" y="130" class="tech-label">🟢 Node.js</text>
  <rect x="140" y="115" width="300" height="20" class="bar-bg"/>
  <rect x="140" y="115" width="270" height="20" class="bar-fill-secondary animate-bar-2"/>
  <text x="450" y="130" class="bar-label">90%</text>
  
  <!-- TypeScript -->
  <text x="20" y="170" class="tech-label">📘 TypeScript</text>
  <rect x="140" y="155" width="300" height="20" class="bar-bg"/>
  <rect x="140" y="155" width="255" height="20" class="bar-fill animate-bar-3"/>
  <text x="450" y="170" class="bar-label">85%</text>
  
  <!-- AWS -->
  <text x="20" y="210" class="tech-label">☁️ AWS</text>
  <rect x="140" y="195" width="300" height="20" class="bar-bg"/>
  <rect x="140" y="195" width="240" height="20" class="bar-fill-secondary animate-bar-4"/>
  <text x="450" y="210" class="bar-label">80%</text>
  
  <!-- Docker -->
  <text x="500" y="90" class="tech-label">🐳 Docker</text>
  <rect x="620" y="75" width="250" height="20" class="bar-bg"/>
  <rect x="620" y="75" width="237" height="20" class="bar-fill animate-bar-5"/>
  <text x="880" y="90" class="bar-label">79%</text>
</svg>
