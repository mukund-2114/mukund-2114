<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020408"/>
      <stop offset="40%" stop-color="#060d12"/>
      <stop offset="100%" stop-color="#020408"/>
    </linearGradient>

    <!-- Neon green glow -->
    <filter id="neonGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blue glow -->
    <filter id="neonBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft text glow -->
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text gradient -->
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff88"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Clip path for scan line -->
    <clipPath id="scanClip">
      <rect x="0" y="0" width="1000" height="300"/>
    </clipPath>

    <!-- Radial glow for center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0a2a1a" stroke-width="0.5"/>
    </pattern>

    <!-- Mask for fade edges -->
    <linearGradient id="edgeFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="black"/>
      <stop offset="10%" stop-color="white"/>
      <stop offset="90%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </linearGradient>
    <mask id="edgeMask">
      <rect width="1000" height="300" fill="url(#edgeFade)"/>
    </mask>
  </defs>

  <!-- Base background -->
  <rect width="1000" height="300" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1000" height="300" fill="url(#grid)" opacity="0.4"/>

  <!-- Center radial glow -->
  <rect width="1000" height="300" fill="url(#centerGlow)"/>

  <!-- Neural network lines - background layer -->
  <g opacity="0.15" stroke="#00ff88" stroke-width="0.8" fill="none">
    <line x1="0" y1="80" x2="200" y2="150">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="150" x2="350" y2="60">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="350" y1="60" x2="500" y2="150">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="150" x2="650" y2="80">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="650" y1="80" x2="800" y2="200">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="800" y1="200" x2="1000" y2="120">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="200" x2="300" y2="250">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="250" x2="500" y2="150">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="700" y1="250" x2="1000" y2="180">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Neural nodes -->
  <g filter="url(#neonGreen)">
    <circle cx="0" cy="80" r="3" fill="#00ff88" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="150" r="4" fill="#00ff88" opacity="0.8">
      <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="60" r="3" fill="#00d4ff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="150" r="5" fill="#00ff88" opacity="0.9">
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="80" r="3" fill="#00d4ff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="200" r="4" fill="#00ff88" opacity="0.8">
      <animate attributeName="r" values="4;6;4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="250" r="3" fill="#00d4ff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="250" r="3" fill="#00ff88" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating binary/matrix code columns -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#00ff88" opacity="0.12">
    <text x="30" y="20">01101001</text>
    <text x="30" y="32">10010110</text>
    <text x="30" y="44">01001010</text>
    <text x="30" y="56">11010101</text>
    <animate attributeName="opacity" values="0.12;0.06;0.12" dur="3s" repeatCount="indefinite"/>
  </g>
  <g font-family="'Courier New', monospace" font-size="11" fill="#00ff88" opacity="0.1">
    <text x="880" y="200">01110011</text>
    <text x="880" y="212">10100110</text>
    <text x="880" y="224">01001101</text>
    <text x="880" y="236">11001100</text>
    <animate attributeName="opacity" values="0.1;0.04;0.1" dur="4s" repeatCount="indefinite"/>
  </g>
  <g font-family="'Courier New', monospace" font-size="10" fill="#00d4ff" opacity="0.08">
    <text x="920" y="30">const ai =</text>
    <text x="920" y="42">&#123; thinking&#125;</text>
    <animate attributeName="opacity" values="0.08;0.15;0.08" dur="5s" repeatCount="indefinite"/>
  </g>

  <!-- Scan line sweep -->
  <rect x="0" y="0" width="3" height="300" fill="url(#heroGrad)" opacity="0.6" clip-path="url(#scanClip)">
    <animate attributeName="x" values="-10;1010;-10" dur="4s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Horizontal accent lines -->
  <line x1="100" y1="82" x2="400" y2="82" stroke="#00ff88" stroke-width="0.5" opacity="0.3">
    <animate attributeName="x2" values="100;400;100" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="600" y1="82" x2="900" y2="82" stroke="#00ff88" stroke-width="0.5" opacity="0.3">
    <animate attributeName="x1" values="900;600;900" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="150" y1="218" x2="400" y2="218" stroke="#00d4ff" stroke-width="0.5" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.6;0.25" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="600" y1="218" x2="850" y2="218" stroke="#00d4ff" stroke-width="0.5" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.6;0.25" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Corner brackets -->
  <g stroke="#00ff88" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 20 25 L 20 10 L 35 10"/>
    <path d="M 980 25 L 980 10 L 965 10"/>
    <path d="M 20 275 L 20 290 L 35 290"/>
    <path d="M 980 275 L 980 290 L 965 290"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Floating particles -->
  <g fill="#00ff88" filter="url(#neonGreen)">
    <circle cx="80" cy="100" r="1.5" opacity="0.6">
      <animate attributeName="cy" values="100;75;100" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="920" cy="130" r="2" opacity="0.5">
      <animate attributeName="cy" values="130;100;130" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="240" r="1.5" opacity="0.4">
      <animate attributeName="cy" values="240;215;240" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="840" cy="60" r="2" opacity="0.5">
      <animate attributeName="cy" values="60;35;60" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="30" r="1.5" opacity="0.4">
      <animate attributeName="cy" values="30;15;30" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="270" r="1.5" opacity="0.4">
      <animate attributeName="cy" values="270;255;270" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="#00d4ff">
    <circle cx="250" cy="50" r="1.5" opacity="0.5">
      <animate attributeName="cy" values="50;30;50" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="260" r="1.5" opacity="0.4">
      <animate attributeName="cy" values="260;240;260" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main name text -->
  <text x="500" y="122" font-family="'Courier New', monospace" font-size="58" font-weight="900"
        text-anchor="middle" fill="url(#heroGrad)" filter="url(#textGlow)" letter-spacing="6">
    MUKUND KAPADIA
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
  </text>

  <!-- Glitch layer 1 -->
  <text x="502" y="122" font-family="'Courier New', monospace" font-size="58" font-weight="900"
        text-anchor="middle" fill="#ff0055" opacity="0" letter-spacing="6">
    MUKUND KAPADIA
    <animate attributeName="opacity" values="0;0;0;0.4;0;0;0;0;0.3;0;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="502;498;504;502" dur="5s" repeatCount="indefinite"/>
  </text>
  <!-- Glitch layer 2 -->
  <text x="498" y="122" font-family="'Courier New', monospace" font-size="58" font-weight="900"
        text-anchor="middle" fill="#00d4ff" opacity="0" letter-spacing="6">
    MUKUND KAPADIA
    <animate attributeName="opacity" values="0;0;0;0;0.3;0;0;0;0;0.4;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="498;503;496;498" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Role tag line -->
  <text x="500" y="160" font-family="'Courier New', monospace" font-size="15" font-weight="400"
        text-anchor="middle" fill="#8b949e" letter-spacing="3">
    FULL-STACK ENGINEER  ·  SYSTEM ARCHITECT  ·  CLOUD STRATEGIST
    <animate attributeName="opacity" values="0;1" dur="1.5s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- AI label chips -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1s" fill="freeze"/>
    <!-- Chip 1: React -->
    <rect x="310" y="190" width="60" height="22" rx="11" fill="#0a1f0a" stroke="#00ff88" stroke-width="0.8"/>
    <text x="340" y="205" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#00ff88">React</text>
    <!-- Chip 2: TypeScript -->
    <rect x="378" y="190" width="80" height="22" rx="11" fill="#0a0f1f" stroke="#00d4ff" stroke-width="0.8"/>
    <text x="418" y="205" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#00d4ff">TypeScript</text>
    <!-- Chip 3: AWS -->
    <rect x="466" y="190" width="45" height="22" rx="11" fill="#1a0f00" stroke="#ff9900" stroke-width="0.8"/>
    <text x="488" y="205" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#ff9900">AWS</text>
    <!-- Chip 4: Docker -->
    <rect x="519" y="190" width="58" height="22" rx="11" fill="#0a1520" stroke="#2496ed" stroke-width="0.8"/>
    <text x="548" y="205" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#2496ed">Docker</text>
    <!-- Chip 5: Next.js -->
    <rect x="585" y="190" width="55" height="22" rx="11" fill="#0f0f0f" stroke="#ffffff" stroke-width="0.8"/>
    <text x="612" y="205" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#ffffff">Next.js</text>
    <!-- Chip 6: Node.js -->
    <rect x="648" y="190" width="55" height="22" rx="11" fill="#0a1f0a" stroke="#3fb950" stroke-width="0.8"/>
    <text x="675" y="205" font-family="'Courier New', monospace" font-size="10" text-anchor="middle" fill="#3fb950">Node.js</text>
  </g>

  <!-- Status bar -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.5s" fill="freeze"/>
    <circle cx="430" cy="248" r="4" fill="#00ff88">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;6;4" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="442" y="253" font-family="'Courier New', monospace" font-size="12" fill="#8b949e" letter-spacing="1">
      🍁 Toronto, ON  ·  Open to Opportunities  ·  2+ Yrs Production
    </text>
  </g>
</svg>
