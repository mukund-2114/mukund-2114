<svg width="1000" height="250" viewBox="0 0 1000 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background: deep navy/slate -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Subtle grid -->
    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1c2a3a" stroke-width="0.5"/>
    </pattern>

    <!-- Name gradient: slate blue to indigo -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#e6edf3"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0"/>
      <stop offset="30%" stop-color="#1f6feb"/>
      <stop offset="70%" stop-color="#388bfd"/>
      <stop offset="100%" stop-color="#388bfd" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle glow for name -->
    <filter id="nameGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Top edge gradient -->
    <linearGradient id="topEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0"/>
      <stop offset="20%" stop-color="#1f6feb" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#388bfd" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#1f6feb" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </linearGradient>

    <!-- Radial glow behind center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <!-- Fade mask for subtle particles -->
    <radialGradient id="particleFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1000" height="250" fill="url(#bg)"/>
  <rect width="1000" height="250" fill="url(#grid)"/>
  <rect width="1000" height="250" fill="url(#centerGlow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1000" height="2" fill="url(#topEdge)"/>

  <!-- Subtle horizontal dividers -->
  <line x1="80" y1="195" x2="920" y2="195" stroke="#21262d" stroke-width="1"/>

  <!-- Corner brackets — minimal, professional -->
  <g stroke="#30363d" stroke-width="1.2" fill="none">
    <path d="M 24 32 L 24 18 L 38 18"/>
    <path d="M 976 32 L 976 18 L 962 18"/>
    <path d="M 24 218 L 24 232 L 38 232"/>
    <path d="M 976 218 L 976 232 L 962 232"/>
  </g>

  <!-- Very subtle floating dots — small, low opacity, NO glow -->
  <circle cx="90" cy="55" r="1.2" fill="#388bfd" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="910" cy="70" r="1" fill="#388bfd" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.5;0.25" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="190" r="1" fill="#58a6ff" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="175" r="1.2" fill="#58a6ff" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="30" r="1" fill="#388bfd" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Small dash marks left/right of name — decorative only -->
  <line x1="230" y1="108" x2="310" y2="108" stroke="#1f6feb" stroke-width="1" opacity="0.5"/>
  <line x1="690" y1="108" x2="770" y2="108" stroke="#1f6feb" stroke-width="1" opacity="0.5"/>

  <!-- Main name -->
  <text x="500" y="118" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="52" font-weight="700" letter-spacing="4"
        text-anchor="middle" fill="url(#nameGrad)" filter="url(#nameGlow)">
    MUKUND KAPADIA
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="500" y="152" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif"
        font-size="15" font-weight="400" letter-spacing="2"
        text-anchor="middle" fill="#8b949e">
    Full-Stack Engineer  ·  System Architect  ·  Cloud Strategist
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- Accent underline that grows from center -->
  <rect x="500" y="163" width="0" height="2" rx="1" fill="url(#accentGrad)">
    <animate attributeName="width" from="0" to="320" dur="1s" begin="0.4s" fill="freeze"/>
    <animate attributeName="x" from="500" to="340" dur="1s" begin="0.4s" fill="freeze"/>
  </rect>

  <!-- Status line -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.8s" fill="freeze"/>
    <!-- Green dot -->
    <circle cx="418" cy="208" r="4" fill="#3fb950">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="430" y="213" font-family="'Segoe UI', 'Inter', sans-serif" font-size="12"
          fill="#8b949e" letter-spacing="0.5">
      Open to Opportunities  ·  🍁 Toronto, ON  ·  2+ Years Production
    </text>
  </g>
</svg>
